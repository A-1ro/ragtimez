name = "ai-tech-daily"
pages_build_output_dir = "./dist"
compatibility_date = "2025-04-07"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding – used for LLM / embedding calls from Pages Functions
[ai]
binding = "AI"
# remote = true  # ローカル開発時はコメントアウト（本番では有効にすること）

# Cloudflare AI Search binding – enables querying the crawl index from Workers
# ローカル開発時はセクション全体をコメントアウト（インスタンスが存在しないとエラーになるため）
# 本番デプロイ前に以下のコメントを外すこと
# [[ai_search]]
# binding = "AI_SEARCH"
# instance_name = "ai-tech-daily-search"
# remote = true

# KV namespace for GitHub OAuth session storage.
#
# Production (Cloudflare Pages dashboard):
#   Settings → Functions → KV namespace bindings → Add binding
#   Variable name: AUTH_KV  →  select your namespace
#
# Local development (wrangler pages dev):
#   1. wrangler kv namespace create AUTH_KV
#   2. wrangler kv namespace create AUTH_KV --preview
#   3. Fill in the IDs below.
#
# NOTE: Do NOT commit real namespace IDs to source control.
#       The [[kv_namespaces]] block below is intentionally left unconfigured
#       so that wrangler pages dev fails with a clear error rather than
#       deploying with wrong IDs.  Update this file locally before running
#       `wrangler pages dev`.
#
# [[kv_namespaces]]
# binding = "AUTH_KV"
# id = "<your-kv-namespace-id>"
# preview_id = "<your-kv-preview-namespace-id>"

# D1 database for user profiles and community notes.
#
# Production (Cloudflare Pages dashboard):
#   Settings → Functions → D1 database bindings → Add binding
#   Variable name: DB → select your database
#
# Local development (wrangler pages dev):
#   1. wrangler d1 create ragtimez-notes
#   2. wrangler d1 migrations apply --local
#   3. Fill in the database_id below.
#
# [[d1_databases]]
# binding = "DB"
# database_name = "ragtimez-notes"
# database_id = "<your-d1-database-id>"
