name = "ai-tech-daily"
pages_build_output_dir = "./dist"
compatibility_date = "2025-04-07"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding – used for LLM / embedding calls from Pages Functions
[ai]
binding = "AI"
remote = true

# Cloudflare AI Search binding – enables querying the crawl index from Workers
[[ai_search]]
binding = "AI_SEARCH"
instance_name = "ai-tech-daily-search"
remote = true

# KV namespace for GitHub OAuth session storage.
# To create the namespace, run:
#   wrangler kv namespace create AUTH_KV
# Then replace the placeholder IDs below with the real namespace IDs.
[[kv_namespaces]]
binding = "AUTH_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_NAMESPACE_PREVIEW_ID"
