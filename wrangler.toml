name = "ragtimez"
pages_build_output_dir = "./dist"
compatibility_date = "2025-04-07"
compatibility_flags = ["nodejs_compat"]

[vars]
SITE_URL = "https://ragtimez.com"

# Workers AI binding – used for LLM / embedding calls from Pages Functions
[ai]
binding = "AI"
remote = true  # ローカル開発時はコメントアウト（本番では有効にすること）

[[d1_databases]]
binding = "DB"
database_name = "ragtimez-notes"
database_id = "a89f7c27-6f41-4d31-a820-28e8bfcf4566"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[kv_namespaces]]
binding = "AUTH_KV"
id = "dee444cd9a8545c096aa7727217d7320"
preview_id = "c4f39ef696eb4e10887031b9080765fc"

[[kv_namespaces]]
binding = "SUBSCRIBERS_KV"
id = "7cf4466793bd46b788220060c3fbc7ce"
preview_id = "df986b4b4a344fb48837bf532ad37f13"