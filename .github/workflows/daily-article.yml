name: Daily Article Generation

on:
  schedule:
    # 毎朝 6:00 JST (21:00 UTC)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Article date in YYYY-MM-DD format (e.g. 2026-04-08). Defaults to today JST."
        required: false
        type: string
      force:
        description: "Overwrite existing article if present"
        required: false
        type: boolean
        default: false

concurrency:
  group: daily-article
  cancel-in-progress: false

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds
        env:
          FETCH_RSS_URL: ${{ secrets.FETCH_RSS_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          if [ -z "$FETCH_RSS_URL" ]; then
            echo "Error: FETCH_RSS_URL secret is not set"
            exit 1
          fi
          curl -s -f -X POST "$FETCH_RSS_URL" \
            -H "Authorization: Bearer $INTERNAL_API_TOKEN" \
            -H "Content-Type: application/json" \
            --max-time 60 || echo "RSS fetch warning: some feeds may have failed"

      - name: Generate article
        env:
          GENERATE_ARTICLE_URL: ${{ secrets.GENERATE_ARTICLE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          ARTICLE_DATE: ${{ inputs.date }}
          FORCE_FLAG: ${{ inputs.force }}
        run: |
          EXTRA_ARGS=()
          if [ -n "$ARTICLE_DATE" ]; then
            EXTRA_ARGS+=(--date "$ARTICLE_DATE")
          fi
          # FORCE_FLAG is empty on scheduled runs (inputs.force is unset); treated as false intentionally
          if [ "$FORCE_FLAG" = "true" ]; then
            EXTRA_ARGS+=(--force)
          fi
          BEFORE=$(ls src/content/articles/ 2>/dev/null | sort)
          npm run generate:article -- ${EXTRA_ARGS[@]+"${EXTRA_ARGS[@]}"}
          AFTER=$(ls src/content/articles/ 2>/dev/null | sort)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No new article files generated. Exiting."
            exit 1
          fi

      - name: Commit and push generated article
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/articles/
          if git diff --cached --quiet; then
            echo "No new article to commit."
            exit 1
          else
            git commit -m "chore: add daily article $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push origin HEAD
            # Get the article filename (last generated file)
            ARTICLE_FILE=$(ls -t src/content/articles/*.md 2>/dev/null | head -1 || true)
            echo "article_file=${ARTICLE_FILE}" >> $GITHUB_OUTPUT
          fi

      - name: Send newsletter
        if: steps.commit.outcome == 'success' && steps.commit.outputs.article_file != ''
        continue-on-error: true
        env:
          NEWSLETTER_SEND_URL: ${{ secrets.NEWSLETTER_SEND_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          ARTICLE_FILE: ${{ steps.commit.outputs.article_file }}
        run: |
          if [ -z "$NEWSLETTER_SEND_URL" ] || [ -z "$ARTICLE_FILE" ] || [ ! -f "$ARTICLE_FILE" ]; then
            echo "Skipping newsletter: missing URL or article file"
            exit 0
          fi

          # Extract article frontmatter using sed (remove leading/trailing quotes from YAML values)
          TITLE=$(sed -n 's/^title: "\(.*\)"$/\1/p' "$ARTICLE_FILE" | head -1)
          SUMMARY=$(sed -n 's/^summary: "\(.*\)"$/\1/p' "$ARTICLE_FILE" | head -1)

          # Extract slug from filename (e.g., 2026-04-11-article-slug.md -> 2026-04-11-article-slug)
          SLUG=$(basename "$ARTICLE_FILE" .md)

          if [ -z "$TITLE" ] || [ -z "$SUMMARY" ] || [ -z "$SLUG" ]; then
            echo "Skipping newsletter: incomplete article metadata"
            exit 0
          fi

          echo "Sending newsletter for article: $SLUG"

          # Build JSON payload safely using jq
          PAYLOAD=$(jq -n \
            --arg slug "$SLUG" \
            --arg title "$TITLE" \
            --arg summary "$SUMMARY" \
            '{articleSlug: $slug, articleTitle: $title, articleSummary: $summary}')

          curl -s -f -X POST "$NEWSLETTER_SEND_URL" \
            -H "Authorization: Bearer $INTERNAL_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --max-time 60 || echo "Newsletter send failed (continuing)"
